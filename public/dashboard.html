<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Student Dashboard | Njala Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0A4A2F;
            --primary-light: #2C7853;
            --primary-dark: #063520;
            --secondary: #D4AF37;
            --secondary-light: #E5C55C;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-sm: 0.375rem;
            --radius: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark {
            --gray-50: #0F172A;
            --gray-100: #1E293B;
            --gray-200: #334155;
            --gray-800: #F1F5F9;
            --gray-900: #F8FAFC;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-100);
            color: var(--gray-800);
            transition: background 0.2s, color 0.2s;
        }

        .navbar {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-sm);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 12px 0;
        }
        body.dark .navbar {
            background: rgba(15,23,42,0.8);
        }
        .navbar .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .btn-outline {
            padding: 6px 16px;
            border: 1.5px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }
        .btn-icon {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--gray-600);
        }
        .dashboard-wrapper {
            margin-top: 70px;
            padding: 24px;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .welcome-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-xl);
            padding: 28px 32px;
            color: white;
            margin-bottom: 28px;
            box-shadow: var(--shadow-lg);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid var(--gray-200);
        }
        body.dark .stat-card {
            background: var(--gray-200);
            border-color: var(--gray-300);
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .feature-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-sm);
        }
        body.dark .feature-card {
            background: var(--gray-200);
            border-color: var(--gray-300);
        }
        .feature-card:hover {
            transform: translateY(-5px);
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .feature-card:hover .feature-icon {
            background: rgba(255,255,255,0.2);
        }
        .feature-icon {
            width: 56px;
            height: 56px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: white;
            font-size: 1.6rem;
            transition: var(--transition);
        }
        .feature-card h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
        }
        .feature-card p {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-pending { background: var(--warning); color: white; }
        .status-approved { background: var(--success); color: white; }
        .receipt-item {
            background: white;
            border-radius: var(--radius-md);
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-sm);
        }
        body.dark .receipt-item {
            background: var(--gray-200);
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: var(--secondary);
            height: 100%;
            border-radius: 4px;
            transition: width 0.4s ease;
        }
        .map-container {
            height: 400px;
            border-radius: var(--radius-lg);
            margin: 20px 0;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .notification-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: white;
            color: var(--gray-800);
            padding: 12px 20px;
            border-radius: 40px;
            box-shadow: var(--shadow-lg);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid var(--primary);
            animation: slideIn 0.3s ease forwards;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); visibility: hidden; }
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            margin: 8px 0;
            border-radius: 40px;
            border: 1px solid var(--gray-300);
            background: white;
            font-family: inherit;
        }
        body.dark input, body.dark textarea, body.dark select {
            background: var(--gray-100);
            border-color: var(--gray-400);
            color: var(--gray-800);
        }
        .streak-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 12px;
        }
        .streak-day {
            aspect-ratio: 1;
            border-radius: 4px;
        }
        .streak-day.level-0 { background: var(--gray-200); }
        .streak-day.level-1 { background: rgba(245,158,11,0.3); }
        .streak-day.level-2 { background: rgba(245,158,11,0.6); }
        .streak-day.level-3 { background: var(--gold); }
        @media (max-width: 768px) {
            .dashboard-wrapper { padding: 16px; }
            .welcome-card { padding: 20px; }
            .stats-grid { grid-template-columns: 1fr; }
            .features-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <div class="logo-text">Njala<span style="color:var(--secondary)">Smart</span></div>
            </div>
            <div class="nav-links">
                <button class="btn-outline" id="logoutBtn">Logout</button>
                <button class="btn-icon" id="darkModeToggle"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="notificationBell"><i class="fas fa-bell"></i></button>
            </div>
        </div>
    </nav>

    <div class="dashboard-wrapper">
        <div class="container">
            <div id="dashboardContent"></div>
        </div>
    </div>

    <!-- Notifications panel -->
    <div id="notifPanel" style="display:none; position:fixed; bottom:90px; right:24px; width:320px; background:white; border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); padding:16px; z-index:1000;">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px;"><strong>Notifications</strong><button id="closeNotifPanel" style="background:none; border:none; cursor:pointer;">✕</button></div>
        <div id="notifList" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'student') window.location.href = 'index.html';
        const API_BASE = '/api';
        const socket = io();

        let currentPage = 'overview';
        let allPayments = [];
        let availableCourses = [];
        let enrolledCourses = [];

        function showNotification(msg, type='success') {
            const toast = document.createElement('div');
            toast.className = 'notification-toast';
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i><span>${msg}</span>`;
            toast.style.background = type === 'error' ? '#fee2e2' : '#e0f2fe';
            toast.style.color = type === 'error' ? '#b91c1c' : '#065a46';
            toast.style.borderLeftColor = type === 'error' ? '#ef4444' : '#10b981';
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
            const panelList = document.getElementById('notifList');
            if (panelList) {
                const item = document.createElement('div');
                item.innerText = msg;
                item.style.padding = '8px 0';
                item.style.borderBottom = '1px solid #e5e7eb';
                panelList.prepend(item);
            }
        }

        async function apiFetch(url, options = {}) {
            const res = await fetch(API_BASE + url, {
                ...options,
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers }
            });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function loadPayments() {
            try { allPayments = await apiFetch('/clearance/status'); } catch(e) { allPayments = []; }
        }
        async function loadCourses() {
            try {
                availableCourses = await apiFetch('/registration/courses');
                enrolledCourses = await apiFetch(`/registration/enrollment/${user.id}`);
            } catch(e) { availableCourses = []; enrolledCourses = []; }
        }

        // New API functions
        async function loadAdmissionStatus() {
            try { return await apiFetch('/admission/status'); } catch(e) { return { status: 'not_submitted' }; }
        }
        async function loadIdCardStatus() {
            try { return await apiFetch('/id-card/status'); } catch(e) { return { status: 'not_applied' }; }
        }
        async function loadWhatsAppLinks() {
            try { return await apiFetch('/whatsapp-links'); } catch(e) { return { school: '#', department: '#', level: '#' }; }
        }

        async function renderOverview() {
            await loadPayments();
            await loadCourses();
            const approved = allPayments.filter(p => p.status === 'approved').length;
            const pending = allPayments.filter(p => p.status === 'pending').length;
            const totalFees = 4200000;
            const paidFees = allPayments.filter(p => p.status === 'approved').reduce((sum, p) => sum + (p.amount || 0), 0);
            const progress = (paidFees / totalFees) * 100;

            // New data
            const admission = await loadAdmissionStatus();
            const idCard = await loadIdCardStatus();
            const whatsapp = await loadWhatsAppLinks();

            document.getElementById('dashboardContent').innerHTML = `
                <div class="welcome-card">
                    <h2 style="font-size:1.6rem;">Welcome back, ${user.full_name}!</h2>
                    <p style="opacity:0.9; margin-top:6px;">${user.matric_number || user.regNumber || 'Pending'} | ${user.department} | ${user.school || 'N/A'}</p>
                    <p>Level: ${user.level || '200'} | Campus: ${user.campus || 'Bo'}</p>
                    <div class="progress-bar" style="background:rgba(255,255,255,0.3); margin-top:16px;"><div class="progress-fill" style="width:${progress}%; background:#FFD700;"></div></div>
                    <p style="margin-top:8px;">Clearance progress: ${progress.toFixed(0)}% (Le ${paidFees.toLocaleString()} / Le ${totalFees.toLocaleString()})</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-receipt" style="font-size:2rem; color:var(--primary);"></i><h3 style="margin:8px 0;">${approved}</h3><p>Approved Payments</p></div>
                    <div class="stat-card"><i class="fas fa-clock" style="font-size:2rem; color:var(--warning);"></i><h3 style="margin:8px 0;">${pending}</h3><p>Pending Payments</p></div>
                    <div class="stat-card"><i class="fas fa-book" style="font-size:2rem; color:var(--info);"></i><h3 style="margin:8px 0;">${enrolledCourses.length}</h3><p>Current Courses</p></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="card" style="background:var(--bg-card); border-radius:var(--radius-lg); padding:20px;">
                        <h3 class="font-playfair">🎓 Admission Status</h3>
                        <p>Status: <span class="status-badge ${admission.status === 'approved' ? 'status-approved' : 'status-pending'}">${admission.status === 'not_submitted' ? 'Not Submitted' : (admission.status === 'pending' ? 'Pending Verification' : 'Approved')}</span></p>
                        ${admission.regNumber ? `<p>Registration Number: <strong>${admission.regNumber}</strong></p>` : ''}
                        ${admission.status === 'not_submitted' ? `<button id="applyAdmissionBtn" class="btn-primary mt-2">Apply for Admission</button>` : ''}
                    </div>
                    <div class="card" style="background:var(--bg-card); border-radius:var(--radius-lg); padding:20px;">
                        <h3 class="font-playfair">🪪 Student ID Card</h3>
                        <p>Status: <span class="status-badge ${idCard.status === 'approved' ? 'status-approved' : 'status-pending'}">${idCard.status === 'not_applied' ? 'Not Applied' : (idCard.status === 'pending' ? 'Pending' : 'Approved')}</span></p>
                        ${idCard.status === 'not_applied' ? `<button id="applyIdCardBtn" class="btn-primary mt-2">Apply for ID Card</button>` : ''}
                        ${idCard.status === 'approved' ? `<button id="downloadIdCardBtn" class="btn-primary mt-2">Download ID Card</button>` : ''}
                    </div>
                </div>
                <div class="card mb-8" style="background:var(--bg-card); border-radius:var(--radius-lg); padding:20px;">
                    <h3 class="font-playfair">📱 Campus Communities (WhatsApp)</h3>
                    <div style="display:flex; gap:16px; flex-wrap:wrap;">
                        <a href="${whatsapp.school}" target="_blank" class="whatsapp-link" style="background:#25D366; color:white; padding:8px 16px; border-radius:40px; text-decoration:none;"><i class="fab fa-whatsapp"></i> School Community</a>
                        <a href="${whatsapp.department}" target="_blank" class="whatsapp-link" style="background:#25D366; color:white; padding:8px 16px; border-radius:40px; text-decoration:none;"><i class="fab fa-whatsapp"></i> Department Community</a>
                        <a href="${whatsapp.level}" target="_blank" class="whatsapp-link" style="background:#25D366; color:white; padding:8px 16px; border-radius:40px; text-decoration:none;"><i class="fab fa-whatsapp"></i> Level Community</a>
                    </div>
                </div>
                <div class="features-grid" id="featuresGrid"></div>
            `;
            const features = [
                { icon: "upload", name: "Fee Clearance", desc: "Submit payment proof", action: "clearance" },
                { icon: "download", name: "My Receipts", desc: "Download approved receipts", action: "receipts" },
                { icon: "calendar-plus", name: "Course Registration", desc: "Enroll in courses", action: "registration" },
                { icon: "exclamation-triangle", name: "SOS Emergency", desc: "Instant alert", action: "sos" },
                { icon: "map", name: "Campus Map", desc: "Interactive map", action: "map" },
                { icon: "search", name: "Lost & Found", desc: "Report lost items", action: "lostfound" },
                { icon: "graduation-cap", name: "AI Study Assistant", desc: "Summarize, quiz, explain", action: "ai" },
                { icon: "comments", name: "Njala Connect", desc: "Real-time chat", action: "chat" }
            ];
            const grid = document.getElementById('featuresGrid');
            grid.innerHTML = features.map(f => `
                <div class="feature-card" onclick="loadPage('${f.action}')">
                    <div class="feature-icon"><i class="fas fa-${f.icon}"></i></div>
                    <h3>${f.name}</h3>
                    <p>${f.desc}</p>
                </div>
            `).join('');

            // Attach event listeners after DOM update
            if (document.getElementById('applyAdmissionBtn')) document.getElementById('applyAdmissionBtn').onclick = showAdmissionModal;
            if (document.getElementById('applyIdCardBtn')) document.getElementById('applyIdCardBtn').onclick = showIdCardModal;
            if (document.getElementById('downloadIdCardBtn')) document.getElementById('downloadIdCardBtn').onclick = downloadIdCard;
        }

        function showAdmissionModal() {
            const modalHtml = `
                <div id="admissionModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:2000;">
                    <div style="background:white; padding:24px; border-radius:24px; width:90%; max-width:500px;">
                        <h3>Admission Application</h3>
                        <form id="admissionForm" enctype="multipart/form-data">
                            <input type="file" name="photo" accept="image/*" required placeholder="Passport Photo">
                            <input type="file" name="waec" accept=".pdf,.jpg" required placeholder="WAEC Result">
                            <input type="file" name="birthCert" accept=".pdf,.jpg" required placeholder="Birth Certificate">
                            <input type="file" name="admissionLetter" accept=".pdf,.jpg" required placeholder="Admission Letter">
                            <button type="submit" class="btn-primary">Submit Application</button>
                        </form>
                        <button id="closeModal" style="margin-top:12px;">Cancel</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            document.getElementById('admissionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const res = await fetch(API_BASE+'/admission/apply', { method:'POST', headers:{ 'Authorization': `Bearer ${token}` }, body: formData });
                const data = await res.json();
                showNotification(data.message);
                document.getElementById('admissionModal').remove();
                renderOverview();
            });
            document.getElementById('closeModal').onclick = () => document.getElementById('admissionModal').remove();
        }

        function showIdCardModal() {
            const modalHtml = `
                <div id="idCardModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:2000;">
                    <div style="background:white; padding:24px; border-radius:24px; width:90%; max-width:500px;">
                        <h3>ID Card Application</h3>
                        <form id="idCardForm" enctype="multipart/form-data">
                            <input type="file" name="photo" accept="image/*" required>
                            <input type="date" name="dob" required placeholder="Date of Birth">
                            <select name="gender" required><option>Male</option><option>Female</option></select>
                            <input type="tel" name="phone" placeholder="Phone" required>
                            <input type="text" name="address" placeholder="Home Address" required>
                            <input type="text" name="emergency_contact" placeholder="Emergency Contact" required>
                            <button type="submit" class="btn-primary">Submit</button>
                        </form>
                        <button id="closeIdModal" style="margin-top:12px;">Cancel</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            document.getElementById('idCardForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                formData.append('full_name', user.full_name);
                formData.append('reg_number', user.regNumber || '');
                const res = await fetch(API_BASE+'/id-card/apply', { method:'POST', headers:{ 'Authorization': `Bearer ${token}` }, body: formData });
                const data = await res.json();
                showNotification(data.message);
                document.getElementById('idCardModal').remove();
                renderOverview();
            });
            document.getElementById('closeIdModal').onclick = () => document.getElementById('idCardModal').remove();
        }

        function downloadIdCard() {
            alert('ID card download will be implemented (generate PDF with QR code)');
        }

        // Keep all existing feature functions (clearance, receipts, registration, SOS, map, lostfound, AI, chat)
        // They are unchanged, only the overview is extended. The rest remain as in the original dashboard.
        // For brevity, I'll keep them identical to your previous version, just refer to them.
        async function renderClearance() {
            await loadPayments();
            document.getElementById('dashboardContent').innerHTML = `
                <div class="welcome-card"><h2>Fee Clearance</h2><p>Submit payment proof for approval.</p></div>
                <div style="background:white; border-radius:var(--radius-lg); padding:20px; margin-bottom:20px; box-shadow:var(--shadow);">
                    <form id="paymentForm">
                        <input type="number" name="amount" placeholder="Amount (Le)" required>
                        <input type="text" name="transaction_id" placeholder="Transaction ID" required>
                        <input type="file" name="receipt" accept="image/*,application/pdf" required>
                        <button type="submit" class="btn-primary" style="width:100%; margin-top:12px;">Submit Payment Proof</button>
                    </form>
                </div>
                <div id="paymentHistory"></div>
            `;
            document.getElementById('paymentForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                try {
                    const res = await fetch(API_BASE + '/clearance/upload', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    const data = await res.json();
                    showNotification(data.message || 'Submitted');
                    renderClearance();
                } catch(err) { showNotification('Upload failed', 'error'); }
            });
            const container = document.getElementById('paymentHistory');
            if (allPayments.length === 0) container.innerHTML = '<p>No payment records.</p>';
            else container.innerHTML = allPayments.map(p => `
                <div class="receipt-item">
                    <span>Le ${p.amount} - ${p.transaction_id}</span>
                    <span class="status-badge status-${p.status}">${p.status.toUpperCase()}</span>
                    ${p.status === 'approved' ? `<button onclick="downloadReceipt(${p.id})" class="btn-primary" style="padding:4px 12px;">Download</button>` : ''}
                </div>
            `).join('');
        }

        async function renderReceipts() {
            await loadPayments();
            const approved = allPayments.filter(p => p.status === 'approved');
            document.getElementById('dashboardContent').innerHTML = `
                <div class="welcome-card"><h2>My Digital Receipts</h2><p>Approved receipts with QR codes.</p></div>
                <div id="receiptList"></div>
            `;
            const container = document.getElementById('receiptList');
            if (!approved.length) container.innerHTML = '<p>No approved receipts yet.</p>';
            else container.innerHTML = approved.map(p => `
                <div class="receipt-item">
                    <span><strong>Le ${p.amount}</strong> - ${p.transaction_id}</span>
                    <button onclick="downloadReceipt(${p.id})" class="btn-primary">Download PDF</button>
                </div>
            `).join('');
        }

        window.downloadReceipt = async (id) => {
            try {
                const res = await fetch(API_BASE + `/clearance/receipt/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `receipt_${id}.pdf`;
                    a.click();
                    URL.revokeObjectURL(url);
                } else alert('Receipt not ready');
            } catch(e) { alert('Error'); }
        };

        async function renderRegistration() {
            await loadCourses();
            const enrolledIds = enrolledCourses.map(e => e.course_id);
            document.getElementById('dashboardContent').innerHTML = `
                <div class="welcome-card"><h2>Course Registration</h2><p>Select your courses.</p></div>
                <div class="stats-grid">
                    <div class="stat-card"><h3>Available Courses</h3><div id="availableCourses"></div></div>
                    <div class="stat-card"><h3>My Enrolled Courses</h3><div id="enrolledCourses"></div></div>
                </div>
            `;
            const availDiv = document.getElementById('availableCourses');
            availDiv.innerHTML = availableCourses.map(c => `
                <div class="receipt-item" style="flex-direction:column; align-items:flex-start;">
                    <strong>${c.course_code}</strong> - ${c.course_name} (${c.credits} credits)
                    ${!enrolledIds.includes(c.id) ? `<button onclick="enrollCourse(${c.id})" class="btn-primary" style="margin-top:8px;">Enroll</button>` : '<span class="status-badge status-approved">Enrolled</span>'}
                </div>
            `).join('');
            const enrolledDiv = document.getElementById('enrolledCourses');
            enrolledDiv.innerHTML = enrolledCourses.map(e => `
                <div class="receipt-item">
                    <strong>${e.course_code}</strong> - ${e.course_name}
                    <button onclick="dropCourse(${e.id})" class="btn-outline" style="padding:4px 12px;">Drop</button>
                </div>
            `).join('');
        }
        window.enrollCourse = async (courseId) => {
            await apiFetch('/registration/enrollment', { method: 'POST', body: JSON.stringify({ course_id: courseId }) });
            renderRegistration();
        };
        window.dropCourse = async (enrollmentId) => {
            await apiFetch(`/registration/enrollment/${enrollmentId}`, { method: 'DELETE' });
            renderRegistration();
        };

        function renderSOS() {
            document.getElementById('dashboardContent').innerHTML = `
                <div class="welcome-card"><h2>🚨 Emergency SOS</h2><p>Send instant alert to campus security.</p></div>
                <div style="background:white; border-radius:var(--radius-lg); padding:20px;">
                    <input type="text" id="sosLocation" placeholder="Your location (optional)">
                    <textarea id="sosDesc" rows="3" placeholder="Describe emergency..."></textarea>
                    <button id="sendSOSBtn" class="btn-primary">Send SOS</button>
                </div>
            `;
            document.getElementById('sendSOSBtn').onclick = async () => {
                const location = document.getElementById('sosLocation').value;
                const description = document.getElementById('sosDesc').value;
                try {
                    await apiFetch('/sos/alert', { method: 'POST', body: JSON.stringify({ location, description, student: user }) });
                    showNotification('SOS alert sent!');
                } catch(e) { showNotification('Failed', 'error'); }
            };
        }

        function renderMap() {
            document.getElementById('dashboardContent').innerHTML = `<div class="welcome-card"><h2>Campus Map</h2><p>Navigate Njala University.</p></div><div id="campusMap" class="map-container"></div>`;
            const map = L.map('campusMap').setView([8.3833, -11.6667], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            L.marker([8.385, -11.668]).addTo(map).bindPopup('Main Library').openPopup();
            L.marker([8.382, -11.665]).addTo(map).bindPopup('Computer Science Faculty');
            L.marker([8.384, -11.670]).addTo(map).bindPopup('Hostel Block A');
        }

        async function renderLostFound() {
            let items = [];
            try { items = await apiFetch('/lostfound'); } catch(e) {}
            document.getElementById('dashboardContent').innerHTML = `
                <div class="welcome-card"><h2>Lost & Found</h2><p>Report lost or found items.</p></div>
                <div style="background:white; border-radius:var(--radius-lg); padding:20px; margin-bottom:20px;">
                    <form id="lostForm">
                        <input type="text" name="item" placeholder="Item name" required>
                        <input type="text" name="location" placeholder="Location">
                        <textarea name="description" placeholder="Description"></textarea>
                        <select name="type"><option value="lost">I lost something</option><option value="found">I found something</option></select>
                        <button type="submit" class="btn-primary">Report</button>
                    </form>
                </div>
                <div id="itemsList"></div>
            `;
            document.getElementById('lostForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);
                try {
                    await apiFetch('/lostfound', { method: 'POST', body: JSON.stringify(data) });
                    showNotification('Item reported');
                    renderLostFound();
                } catch(err) { showNotification('Error', 'error'); }
            });
            const container = document.getElementById('itemsList');
            if (!items.length) container.innerHTML = '<p>No items yet.</p>';
            else container.innerHTML = items.map(i => `<div class="receipt-item"><strong>${i.item}</strong> (${i.type}) - ${i.location}<br>${i.description}</div>`).join('');
        }

        function renderAI() {
            document.getElementById('dashboardContent').innerHTML = `
                <div class="welcome-card"><h2>🤖 AI Study Assistant</h2><p>Get instant help with your studies.</p></div>
                <div style="background:white; border-radius:var(--radius-lg); padding:20px;">
                    <textarea id="aiQuestion" rows="4" placeholder="Paste your notes or ask a question..."></textarea>
                    <div style="display:flex; gap:12px; margin:12px 0; flex-wrap:wrap;">
                        <button onclick="askAI('summarize')" class="btn-primary">Summarize</button>
                        <button onclick="askAI('explain')" class="btn-primary">Explain Simply</button>
                        <button onclick="askAI('quiz')" class="btn-primary">Generate Quiz</button>
                    </div>
                    <div id="aiResponse" style="background:var(--gray-100); padding:16px; border-radius:var(--radius-md); white-space:pre-wrap; margin-top:12px;"></div>
                </div>
            `;
        }
        window.askAI = async (action) => {
            const question = document.getElementById('aiQuestion').value;
            if (!question) { showNotification('Please enter text', 'error'); return; }
            let prompt = '';
            if (action === 'summarize') prompt = `Summarize the following text: ${question}`;
            else if (action === 'explain') prompt = `Explain this in simple terms: ${question}`;
            else prompt = `Generate a 3-question quiz based on: ${question}`;
            try {
                const res = await apiFetch('/ai/chat', { method: 'POST', body: JSON.stringify({ message: prompt }) });
                document.getElementById('aiResponse').innerHTML = res.reply.replace(/\n/g, '<br>');
            } catch(e) { document.getElementById('aiResponse').innerHTML = 'Error contacting AI.'; }
        };

        function renderChat() {
            document.getElementById('dashboardContent').innerHTML = `<div style="height:80vh; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow);"><iframe src="/chat.html" style="width:100%; height:100%; border:none;"></iframe></div>`;
        }

        // Navigation
        window.loadPage = async (page) => {
            currentPage = page;
            if (page === 'overview') await renderOverview();
            else if (page === 'clearance') await renderClearance();
            else if (page === 'receipts') await renderReceipts();
            else if (page === 'registration') await renderRegistration();
            else if (page === 'sos') renderSOS();
            else if (page === 'map') renderMap();
            else if (page === 'lostfound') await renderLostFound();
            else if (page === 'ai') renderAI();
            else if (page === 'chat') renderChat();
            else await renderOverview();
        };

        // Notifications
        const notifPanel = document.getElementById('notifPanel');
        document.getElementById('notificationBell').onclick = () => {
            notifPanel.style.display = notifPanel.style.display === 'none' ? 'block' : 'none';
        };
        document.getElementById('closeNotifPanel').onclick = () => notifPanel.style.display = 'none';
        socket.on('new_notification', (data) => showNotification(data.message));
        socket.on('payment_updated', () => { if (currentPage === 'overview') renderOverview(); });

        // Logout & dark mode
        document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'index.html'; };
        const darkToggle = document.getElementById('darkModeToggle');
        darkToggle.onclick = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', document.body.classList.contains('dark'));
        };
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

        loadPage('overview');
    </script>
</body>
