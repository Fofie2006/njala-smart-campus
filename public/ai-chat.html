<!DOCTYPE html>
<html>
<head>
    <title>Njala AI</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; background: #f0f2f5; }
        .chat { background: white; border-radius: 20px; padding: 20px; height: 500px; overflow-y: auto; margin-bottom: 20px; }
        .user { background: #0F3B2C; color: white; padding: 10px; border-radius: 15px; margin: 10px 0; text-align: right; }
        .bot { background: #e9ecef; padding: 10px; border-radius: 15px; margin: 10px 0; }
        input { width: 80%; padding: 10px; margin-right: 10px; }
        button { padding: 10px 20px; background: #0F3B2C; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🤖 Njala AI – General Knowledge + Campus</h1>
    <div class="chat" id="chat"></div>
    <input type="text" id="question" placeholder="Ask me anything...">
    <button onclick="ask()">Send</button>

    <script>
        const chatDiv = document.getElementById('chat');
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = role;
            div.innerText = text;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        async function ask() {
            const input = document.getElementById('question');
            const text = input.value.trim();
            if (!text) return;
            addMessage('user', text);
            input.value = '';

            try {
                const response = await fetch('/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                addMessage('bot', data.reply);
            } catch (err) {
                addMessage('bot', '❌ Error: ' + err.message);
            }
        }

        document.getElementById('question').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') ask();
        });

        addMessage('bot', '👋 Hi! Ask me about science, math, coding, or Njala campus (fees, registration, Krio).');
    </script>
</body>
</html>
